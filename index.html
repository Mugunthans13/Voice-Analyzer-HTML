<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Analyzer</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #0b132b, #020617);
    color: #cbd5f5;
}

/* Header */
.header {
    text-align: center;
    padding: 20px;
}
.header h1 {
    color: #7dd3fc;
    letter-spacing: 2px;
}
.header p {
    font-size: 12px;
    opacity: 0.6;
}

/* Cards */
.grid {
    display: flex;
    justify-content: space-around;
    margin: 20px;
    gap: 10px;
}

.card {
    flex: 1;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    background: rgba(255,255,255,0.05);
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

.card h3 {
    font-size: 12px;
    opacity: 0.6;
}

.value {
    font-size: 30px;
    margin-top: 10px;
}

/* Wave box */
.wave {
    margin: 20px;
    padding: 20px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
}

/* Pitch meter */
.pitch {
    margin: 20px;
    padding: 20px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
}

.bar {
    height: 10px;
    border-radius: 10px;
    background: linear-gradient(to right,
        blue, green, orange, red);
}

/* Labels */
.labels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin: 20px;
}

.label {
    padding: 15px;
    border-radius: 10px;
    background: rgba(255,255,255,0.05);
}

/* Transcript */
.transcript {
    margin: 20px;
    padding: 20px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
    height: 120px;
}

/* Buttons */
.controls {
    display: flex;
    justify-content: space-around;
    margin: 20px;
}

button {
    padding: 15px 30px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
    font-size: 16px;
}

.start {
    background: linear-gradient(45deg, #6366f1, #a78bfa);
    color: white;
}

.reset {
    background: transparent;
    border: 1px solid #555;
    color: #aaa;
}
</style>
</head>

<body>

<div class="header">
    <h1>🎤 VOICE ANALYZER</h1>
    <p>Real-time Hz • Word Count • Pitch Detection</p>
</div>

<div class="wave">
    <p>Live Waveform (visual placeholder)</p>
</div>

<div class="grid">
    <div class="card">
        <h3>FREQUENCY</h3>
        <div class="value" id="freq">--</div>
        <small>Hz</small>
    </div>

    <div class="card">
        <h3>WORDS</h3>
        <div class="value" id="words">0</div>
        <small>spoken</small>
    </div>

    <div class="card">
        <h3>DURATION</h3>
        <div class="value" id="time">00:00</div>
        <small id="status">IDLE</small>
    </div>
</div>

<div class="pitch">
    <p>PITCH METER</p>
    <div class="bar"></div>
</div>

<div class="labels">
    <div class="label">🔵 Deep (&lt;130 Hz)</div>
    <div class="label">🟢 Male (130–180 Hz)</div>
    <div class="label">🟠 Female (180–300 Hz)</div>
    <div class="label">🔴 Child (&gt;300 Hz)</div>
</div>

<div class="transcript" id="transcript">
    Press START to begin...
</div>

<div class="controls">
    <button class="start" onclick="start()">▶ START</button>
    <button class="reset" onclick="reset()">RESET</button>
</div>

<script>
let running = false;
let seconds = 0;
let timer;

function start() {
    if (running) return;

    running = true;
    document.getElementById("status").innerText = "RUNNING";

    timer = setInterval(() => {
        seconds++;

        let min = String(Math.floor(seconds / 60)).padStart(2, '0');
        let sec = String(seconds % 60).padStart(2, '0');

        document.getElementById("time").innerText = min + ":" + sec;

        // fake frequency + words
        document.getElementById("freq").innerText =
            Math.floor(Math.random() * 300 + 80);

        document.getElementById("words").innerText =
            Math.floor(seconds / 2);

    }, 1000);
}

function reset() {
    running = false;
    clearInterval(timer);
    seconds = 0;

    document.getElementById("time").innerText = "00:00";
    document.getElementById("freq").innerText = "--";
    document.getElementById("words").innerText = "0";
    document.getElementById("status").innerText = "IDLE";
}
</script>

</body>
</html>
