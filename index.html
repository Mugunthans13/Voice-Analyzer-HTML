<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Analyzer</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:20px;
}

.card{
  background:#020617;
  padding:15px;
  border-radius:10px;
  margin:10px 0;
}

button{
  padding:12px;
  width:100%;
  border:none;
  border-radius:10px;
  font-size:16px;
  background:#6366f1;
  color:white;
}

.bar{
  height:10px;
  background:linear-gradient(90deg,#6366f1,#22c55e,#f59e0b,#ef4444);
  border-radius:5px;
  margin-top:10px;
  position:relative;
}

.pointer{
  width:15px;
  height:15px;
  background:white;
  border-radius:50%;
  position:absolute;
  top:-3px;
  left:0%;
}
</style>
</head>

<body>

<h2>🎙️ Voice Analyzer</h2>

<div class="card">
  Frequency: <span id="hz">--</span> Hz
</div>

<div class="card">
  Words: <span id="words">0</span>
</div>

<div class="card">
  Time: <span id="time">0</span> sec
</div>

<div class="card">
  Pitch Meter
  <div class="bar">
    <div id="dot" class="pointer"></div>
  </div>
</div>

<div class="card" id="text">Press START</div>

<button onclick="start()">START</button>

<script>
let ctx, analyser, stream;
let running=false, time=0, words=0, interval;
let recognition, finalText="";

function detectPitch(buf, sr){
  let size=buf.length;
  let bestOffset=-1;
  let bestCorr=0;

  for(let offset=8; offset<1000; offset++){
    let corr=0;
    for(let i=0;i<1000;i++){
      corr += buf[i]*buf[i+offset];
    }
    if(corr > bestCorr){
      bestCorr = corr;
      bestOffset = offset;
    }
  }

  if(bestOffset>0){
    let hz = sr / bestOffset;
    if(hz > 50 && hz < 500) return Math.round(hz);
  }
  return null;
}

async function start(){
  if(running) return;

  stream = await navigator.mediaDevices.getUserMedia({audio:true});
  ctx = new AudioContext();
  analyser = ctx.createAnalyser();
  let source = ctx.createMediaStreamSource(stream);
  source.connect(analyser);

  let data = new Float32Array(2048);

  function loop(){
    analyser.getFloatTimeDomainData(data);
    let hz = detectPitch(data, ctx.sampleRate);

    if(hz){
      document.getElementById("hz").innerText = hz;
      document.getElementById("dot").style.left = ((hz-50)/450*100)+"%";
    }

    requestAnimationFrame(loop);
  }
  loop();

  // Speech recognition
  let SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(SR){
    recognition = new SR();
    recognition.continuous = true;

    recognition.onresult = (e)=>{
      let txt="";
      for(let i=e.resultIndex;i<e.results.length;i++){
        txt += e.results[i][0].transcript;
      }
      finalText += txt;
      document.getElementById("text").innerText = finalText;

      words = finalText.split(" ").length;
      document.getElementById("words").innerText = words;
    };

    recognition.start();
  }

  interval = setInterval(()=>{
    time++;
    document.getElementById("time").innerText = time;
  },1000);

  running = true;
}
</script>

</body>
</html>
