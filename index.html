<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎙️ Voice Analyzer Pro</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Courier New',monospace;
  background:#0f172a;
  color:#e2e8f0;
  padding:20px;
}

h1{text-align:center;margin-bottom:15px}

.card{
  background:#020617;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

.metrics{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.metric{text-align:center}

.bar{
  height:10px;
  background:linear-gradient(90deg,#6366f1,#22c55e,#f59e0b,#ef4444);
  border-radius:5px;
  margin-top:10px;
  position:relative;
}

.pointer{
  width:15px;height:15px;
  background:white;
  border-radius:50%;
  position:absolute;
  top:-3px;
  left:0%;
}

#vol{
  height:5px;
  background:#22c55e;
  width:0%;
  margin-top:10px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:8px;
  font-weight:bold;
}

#start{background:#6366f1;color:white}
#record{background:#22c55e;color:white}
#reset{background:#111827;color:#aaa}
</style>
</head>

<body>

<h1>🎙️ Voice Analyzer Pro</h1>

<div class="card">
  Frequency: <span id="hz">--</span> Hz
  <div id="vol"></div>
</div>

<div class="metrics">
  <div class="card metric">
    Words<br><b id="words">0</b>
  </div>
  <div class="card metric">
    Time<br><b id="time">0</b>
  </div>
  <div class="card metric">
    Status<br><b id="status">IDLE</b>
  </div>
</div>

<div class="card">
  Pitch Meter
  <div class="bar">
    <div id="dot" class="pointer"></div>
  </div>
</div>

<div class="card" id="text">Press START</div>

<button id="start">▶ START</button>
<button id="record">⏺ RECORD</button>
<button id="reset">↺ RESET</button>

<script>
let ctx, analyser, stream, source;
let running=false, time=0, interval;
let recognition, finalText="", wordCount=0;

let mediaRecorder, audioChunks=[], recording=false;

function detectPitch(buf,sr){
  let SIZE=buf.length;
  let best=-1, bestCorr=0;

  for(let off=20;off<1000;off++){
    let corr=0;
    for(let i=0;i<1000;i++){
      corr += buf[i]*buf[i+off];
    }
    if(corr>bestCorr){
      bestCorr=corr;
      best=off;
    }
  }

  if(best>0){
    let hz=sr/best;
    if(hz>=80 && hz<=400) return Math.round(hz);
  }
  return null;
}

async function start(){
  if(running){stop();return;}

  stream = await navigator.mediaDevices.getUserMedia({
    audio:{
      noiseSuppression:true,
      echoCancellation:true,
      autoGainControl:true
    }
  });

  ctx=new AudioContext();
  analyser=ctx.createAnalyser();
  source=ctx.createMediaStreamSource(stream);
  source.connect(analyser);

  let data=new Float32Array(2048);

  function loop(){
    analyser.getFloatTimeDomainData(data);

    let hz=detectPitch(data,ctx.sampleRate);
    if(hz){
      document.getElementById("hz").innerText=hz;
      document.getElementById("dot").style.left=((hz-80)/320*100)+"%";
    }

    let sum=0;
    for(let i of data) sum+=i*i;
    let vol=Math.sqrt(sum/data.length)*300;
    document.getElementById("vol").style.width=vol+"%";

    requestAnimationFrame(loop);
  }
  loop();

  // Speech recognition FIXED
  let SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(SR){
    recognition = new SR();
    recognition.continuous=true;
    recognition.interimResults=true;
    recognition.lang="en-IN";

    recognition.onresult=(e)=>{
      let final="", interim="";

      for(let i=0;i<e.results.length;i++){
        let t=e.results[i][0].transcript;
        if(e.results[i].isFinal) final+=t+" ";
        else interim+=t;
      }

      finalText=final.trim();
      let full=(finalText+" "+interim).trim();

      document.getElementById("text").innerText=full || "Listening...";

      wordCount = finalText
        ? finalText.split(/\s+/).filter(w=>w).length
        : 0;

      document.getElementById("words").innerText=wordCount;
    };

    recognition.start();
  }

  interval=setInterval(()=>{
    time++;
    document.getElementById("time").innerText=time;
  },1000);

  running=true;
  document.getElementById("status").innerText="LIVE";
}

function stop(){
  running=false;
  stream.getTracks().forEach(t=>t.stop());
  clearInterval(interval);
  if(recognition) recognition.stop();
  document.getElementById("status").innerText="STOPPED";
}

// 🎧 RECORDING
document.getElementById("record").onclick=()=>{
  if(!stream){alert("Start first");return;}

  if(!recording){
    mediaRecorder=new MediaRecorder(stream);
    audioChunks=[];

    mediaRecorder.ondataavailable=e=>audioChunks.push(e.data);

    mediaRecorder.onstop=()=>{
      let blob=new Blob(audioChunks,{type:"audio/webm"});
      let url=URL.createObjectURL(blob);
      let a=document.createElement("a");
      a.href=url;
      a.download="recording.webm";
      a.click();
    };

    mediaRecorder.start();
    recording=true;
    document.getElementById("record").innerText="⏹ STOP RECORD";
  }else{
    mediaRecorder.stop();
    recording=false;
    document.getElementById("record").innerText="⏺ RECORD";
  }
};

document.getElementById("start").onclick=start;

document.getElementById("reset").onclick=()=>{
  stop();
  time=0;
  finalText="";
  wordCount=0;
  document.getElementById("time").innerText=0;
  document.getElementById("words").innerText=0;
  document.getElementById("hz").innerText="--";
  document.getElementById("text").innerText="Press START";
};
</script>

</body>
</html>
